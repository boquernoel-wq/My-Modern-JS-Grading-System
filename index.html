<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading & Validation Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="app.js" defer></script>
</head>
<body class="bg-light vh-100 d-flex flex-column justify-content-center align-items-center">
    
    <div class="card p-4 shadow-sm" style="width: 450px;">
        <h3 class="card-title text-center mb-4">Grading & Validation Engine</h3>
        
        <div class="mb-3">
            <label for="midterm-input" class="form-label">Midterm Grade (45%):</label>
            <input type="text" id="midterm-input" class="form-control" placeholder="Enter score (0-100)">
        </div>
        
        <div class="mb-3">
            <label for="finals-input" class="form-label">Finals Grade (55%):</label>
            <input type="text" id="finals-input" class="form-control" placeholder="Enter score (0-100)">
        </div>
        
        <button id="compute-btn" class="btn btn-primary w-100 mb-4">Compute Grade Matrix</button>
        
        <div class="p-3 bg-white border rounded text-center" id="output-matrix">
            <p class="text-muted m-0">Awaiting system input computation...</p>
        </div>
    </div>

</body>
</html>
